{% extends "base2.html" %}
{% block title %}Add Agent | SecureLife{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-md-10">

      <div class="card shadow-sm border-0 p-2 mt-2 mb-3">
        <div class="card-header text-white text-center" style="background-color: #085A8C;">
          <h5 class="mb-0">
            Add Agent
          </h5>
        </div>

        <div class="card-body">

          <!-- Messages -->
           {% if messages %}
            {% for message in messages %}
              {% if 'error' in message.tags %}
                <div class="alert alert-danger alert-dismissible fade show mt-2" role="alert">
                  {{ message }}
                  <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
              {% else %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show mt-2" role="alert">
                  {{ message }}
                  <button type="button" class="close" data-dismiss="alert" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                  </button>
                </div>
              {% endif %}
            {% endfor %}
          {% endif %}

          <!-- Form -->
          <form method="POST" enctype="multipart/form-data" id="simpleform" action="{% url 'add_agentdb' %}">
            {% csrf_token %}
              <div class="form-group">
                <label>First Name<span class="text-danger">*</span></label>
                <input type="text" name="first_name" id="first_name" class="form-control" placeholder="First Name" required>
              </div>
              <div class="form-group">
                <label>Last Name<span class="text-danger">*</span></label>
                <input type="text" name="last_name" id="last_name" class="form-control" placeholder="Last Name" required>
              </div>
        <div class="form-group">
            <label>Username<span class="text-danger">*</span></label>
            <input type="text" class="form-control validate"
                  data-field="username" name="username">
            <small class="text-danger d-none"></small>
        </div>

        <div class="form-group">
            <label>Mobile<span class="text-danger">*</span></label>
            <input type="text" class="form-control validate"
                  data-field="mobile" name="mobile" id="mobile">
            <small class="text-danger d-none"></small>
        </div>

        <div class="form-group">
            <label>Email<span class="text-danger">*</span></label>
            <input type="email" class="form-control validate"
                  data-field="email" name="email" id="email">
            <small class="text-danger d-none"></small>
        </div>

              <div class="form-group ">
                <label>Date of Birth<span class="text-danger">*</span></label>
                <input type="date" name="dob" id="dob" class="form-control" required>
              </div>

                <div class="form-group">
                <label>Area of Specialization<span class="text-danger">*</span></label>
                <input type="text" name="specialization" class="form-control" placeholder=" " required>
                </div>
                <div class="form-group">
                <label>Upload Profile Image </label>
                <input type="file" name="image" class="form-control-file" accept="image/*">
              </div>
            <div class="d-flex justify-content-center mt-4">
              <button id="submitBtn" type="submit" class="btn" style="background-color: #085A8C;color:white;" >
                Add Agent
              </button>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>

<!-- ================= VALIDATION SCRIPT ================= -->
<script>
  document.querySelectorAll('.validate').forEach(input => {
      input.addEventListener('keyup', function () {

          const field = this.dataset.field;
          const value = this.value.trim();
          const errorBox = this.nextElementSibling;
          const submitBtn = document.getElementById('submitBtn');


          // get all required fields
          const username = document.querySelector('[data-field="username"]').value.trim();
          const mobile   = document.querySelector('[data-field="mobile"]').value.trim();
          const email    = document.querySelector('[data-field="email"]').value.trim();

          if (value.length < 1) {
              errorBox.classList.add('d-none');
              return;
          }
          const url =
            `/ajax/validate/?field=${field}&value=${value}`;
          fetch(url)
              .then(res => res.json())
              .then(data => {
                  if (!data.valid) {
                      errorBox.innerText = data.message;
                      errorBox.classList.remove('d-none');
                      submitBtn.disabled = true;
                  } else {
                      errorBox.classList.add('d-none');
                      
                      if (username && mobile && email) {
                          submitBtn.disabled = false;
                      }
                  }
              });
      });
  });
</script>

{% endblock %}
